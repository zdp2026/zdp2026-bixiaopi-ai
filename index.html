            // 检查是否已登录
            const checkLogin = () => {
                const userEmail = localStorage.getItem('userEmail');
                if (userEmail) {
                    showMainPage(userEmail);
                } else {
                    showLoginPage();
                }
            };

            // 显示登录页面
            const showLoginPage = () => {
                loginPage.classList.remove('hidden');
                mainPage.classList.add('hidden');
            };

            // 显示主页面
            const showMainPage = (email) => {
                console.log('显示主页面，用户邮箱:', email);
                loginPage.classList.add('hidden');
                mainPage.classList.remove('hidden');
                
                // 加载对话列表
                loadConversations();
                
                // 如果没有对话，创建一个新对话
                const conversations = getConversations();
                if (conversations.length === 0) {
                    createNewConversation();
                } else {
                    // 激活第一个对话
                    currentConversationId = conversations[0].id;
                    loadConversation(currentConversationId);
                    updateConversationList();
                }
                
                // 启动自动注销计时器
                resetAutoLogoutTimer();
            };
            
            // 创建新对话
            const createNewConversation = () => {
                // 生成唯一对话ID
                currentConversationId = 'conv_' + Date.now();
                
                // 清空聊天区域
                chatMessages.innerHTML = `
                    <div class="flex items-start space-x-4">

                        </div>
                    </div>
                `;
                
                // 保存对话到本地存储
                const conversations = getConversations();
                conversations.push({
                    id: currentConversationId,
                    title: '新对话',
                    timestamp: Date.now()
                });
                saveConversations(conversations);
                
                // 更新对话列表
                updateConversationList();
            };
            
            // 获取对话列表
            const getConversations = () => {
                const stored = localStorage.getItem('conversations');
                return stored ? JSON.parse(stored) : [];
            };
            
            // 保存对话列表
            const saveConversations = (conversations) => {
                localStorage.setItem('conversations', JSON.stringify(conversations));
            };
            
            // 加载对话列表
            const loadConversations = () => {
                updateConversationList();
            };
            
            // 更新对话列表
            const updateConversationList = () => {
                const conversations = getConversations();
                conversationList.innerHTML = '';
                
                // 确保至少有一个对话
                if (conversations.length === 0) {
                    createNewConversation();
                    return;
                }
                
                conversations.forEach((conv, index) => {
                    const convItem = document.createElement('div');
                    convItem.className = `p-3 rounded-lg cursor-pointer hover:bg-blue-50 transition-colors ${conv.id === currentConversationId ? 'bg-blue-100' : 'bg-neutral-light'} group relative border border-transparent hover:border-primary`;
                    
                    // 创建对话项内容
                    const convContent = document.createElement('div');
                    convContent.className = 'flex items-center justify-between';
                    
                    // 对话序号
                    const convIndex = document.createElement('span');
                    convIndex.className = 'text-xs text-gray-400 w-5 text-center';
                    convIndex.textContent = index + 1;
                    
                    // 对话标题
                    const convTitle = document.createElement('p');
                    convTitle.className = `text-sm font-medium text-neutral-dark truncate flex-1 ml-2 ${sidebarCollapsed ? 'hidden' : ''}`;
                    convTitle.textContent = conv.title;
                    
                    // 更多按钮（仅在悬停时显示）
                    const moreBtn = document.createElement('button');
                    moreBtn.className = 'text-neutral hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100';
                    moreBtn.innerHTML = '<i class="fa fa-ellipsis-v"></i>';
                    
                    // 组装对话项
                    convContent.appendChild(convIndex);
                    convContent.appendChild(convTitle);
                    convContent.appendChild(moreBtn);
                    convItem.appendChild(convContent);
                    
                    // 长按删除相关变量
                    let longPressTimer;
                    let isLongPress = false;
                    
                    // 鼠标按下/触摸开始事件
                    const handlePointerDown = () => {
                        isLongPress = false;
                        longPressTimer = setTimeout(() => {
                            isLongPress = true;
                            if (conversations.length > 1) {
                                if (confirm('确定要删除这个对话吗？')) {
                                    deleteConversation(conv.id);
                                }
                            } else {
                                alert('至少需要保留一个对话');
                            }
                        }, 800); // 800ms长按
                    };
                    
                    // 鼠标抬起/触摸结束事件
                    const handlePointerUp = () => {
                        clearTimeout(longPressTimer);
                        if (!isLongPress) {
                            // 切换到选中的对话
                            currentConversationId = conv.id;
                            loadConversation(conv.id);
                            updateConversationList();
                        }
                    };
                    
                    // 鼠标离开/触摸取消事件
                    const handlePointerLeave = () => {
                        clearTimeout(longPressTimer);
                    };
                    
                    // 添加事件监听器
                    convItem.addEventListener('mousedown', handlePointerDown);
                    convItem.addEventListener('mouseup', handlePointerUp);
                    convItem.addEventListener('mouseleave', handlePointerLeave);
                    
                    // 移动端支持
                    convItem.addEventListener('touchstart', handlePointerDown);
                    convItem.addEventListener('touchend', handlePointerUp);
                    convItem.addEventListener('touchcancel', handlePointerLeave);
                    
                    conversationList.appendChild(convItem);
                });
            };

            // 删除对话
            const deleteConversation = (conversationId) => {
                // 删除对话消息
                localStorage.removeItem(`messages_${conversationId}`);
                
                // 从对话列表中移除
                const conversations = getConversations();
                const updatedConversations = conversations.filter(conv => conv.id !== conversationId);
                saveConversations(updatedConversations);
                
                // 如果删除的是当前对话，激活第一个对话
                if (conversationId === currentConversationId) {
                    const newConversations = getConversations();
                    if (newConversations.length > 0) {
                        currentConversationId = newConversations[0].id;
                        loadConversation(currentConversationId);
                    } else {
                        createNewConversation();
                    }
                }
                
                // 更新对话列表
                updateConversationList();
            };
            
            // 加载对话
            const loadConversation = (conversationId) => {
                const storedMessages = localStorage.getItem(`messages_${conversationId}`);
                if (storedMessages) {
                    const messages = JSON.parse(storedMessages);
                    chatMessages.innerHTML = '';
                    messages.forEach(msg => {
                        addMessage(msg.text, msg.sender, false);
                    });
                } else {
                    chatMessages.innerHTML = `
                        <div class="flex items-start space-x-4">
                            <div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                                <i class="fa fa-robot"></i>
                            </div>
                            <div class="bg-neutral-light rounded-lg p-4 max-w-[80%]">
                                <p class="text-neutral-dark">您好！我是毕小皮AI助手，有什么我能帮您的吗？</p>
                            </div>
                        </div>
                    `;
                }
            };
            
            // 保存消息
            const saveMessage = (text, sender) => {
                if (!currentConversationId) return;
                
                const storedMessages = localStorage.getItem(`messages_${currentConversationId}`);
                const messages = storedMessages ? JSON.parse(storedMessages) : [];
                
                messages.push({
                    text,
                    sender,
                    timestamp: Date.now()
                });
                
                localStorage.setItem(`messages_${currentConversationId}`, JSON.stringify(messages));
                
                // 如果是用户的第一条消息，更新对话标题
                if (sender === 'user' && messages.length === 1) {
                    const conversations = getConversations();
                    const convIndex = conversations.findIndex(c => c.id === currentConversationId);
                    if (convIndex !== -1) {
                        conversations[convIndex].title = text.length > 20 ? text.substring(0, 20) + '...' : text;
                        saveConversations(conversations);
                        updateConversationList();
                    }
                }
            };



            // 登录表单提交
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = document.getElementById('login-password').value.trim();

                console.log('登录表单提交:', { email, password });

                if (!email || !password) {
                    showMessage('请填写完整信息', 'error');
                    return;
                }

                // 验证邮箱格式
                if (!isValidEmail(email)) {
                    showMessage('请输入有效的邮箱地址', 'error');
                    return;
                }

                // 验证密码（4位数，必须包含数字3和9）
                if (!isValidPassword(password)) {
                    showMessage('登录密码错误', 'error');
                    return;
                }

                try {
                    // 登录成功
                    console.log(`用户 ${email} 使用密码 ${password} 登录成功`);
                    localStorage.setItem('userEmail', email);
                    localStorage.setItem('lastActivityTime', Date.now());
                    
                    // 清除可能的注销标记
                    localStorage.removeItem('accountDeletionMarked');
                    localStorage.removeItem('accountDeletionTime');
                    
                    showMessage('登录成功', 'success');
                    
                    // 延迟一下再显示主页面，让用户看到成功提示
                    setTimeout(() => {
                        showMainPage(email);
                    }, 1000);
                } catch (error) {
                    console.error('登录过程中发生错误:', error);
                    showMessage('登录失败，请重试', 'error');
                }
            });

            // 退出登录
            logoutBtn.addEventListener('click', () => {
                clearInterval(autoLogoutTimer);
                localStorage.removeItem('userEmail');
                localStorage.removeItem('lastActivityTime');
                showLoginPage();
            });

            // 技能按钮点击事件
            skillsBtn.addEventListener('click', () => {
                // 切换技能区域显示/隐藏
                if (skillsSection.classList.contains('hidden')) {
                    skillsSection.classList.remove('hidden');
                    chatSection.classList.remove('w-full');
                    chatSection.classList.add('w-2/3');
                } else {
                    skillsSection.classList.add('hidden');
                    chatSection.classList.remove('w-2/3');
                    chatSection.classList.add('w-full');
                }
                resetAutoLogoutTimer();
            });

            // 设置按钮点击事件
            settingsBtn.addEventListener('click', () => {
                settingsDropdown.classList.toggle('hidden');
                resetAutoLogoutTimer();
            });

            // 点击页面其他地方关闭设置菜单
            document.addEventListener('click', (e) => {
                if (!settingsBtn.contains(e.target) && !settingsDropdown.contains(e.target)) {
                    settingsDropdown.classList.add('hidden');
                }
            });

            // 技能卡片点击事件
            skillCards.forEach(card => {
                card.addEventListener('click', () => {
                    const skillName = card.querySelector('h4').textContent;
                    addMessage(`我想使用${skillName}功能`, 'user');
                    
                    // 显示正在输入指示器
                    const typingIndicator = createTypingIndicator();
                    chatMessages.appendChild(typingIndicator);
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                    // 延迟回复
                    setTimeout(() => {
                        chatMessages.removeChild(typingIndicator);
                        
                        let response = '';
                        switch(skillName) {
                            case '生成网站':
                                response = '我可以帮您生成网站。请告诉我您想要什么类型的网站，例如：电商网站、博客、企业官网等。';
                                break;
                            case '生成PPT':
                                response = '我可以帮您生成PPT。请告诉我您的PPT主题和内容要求。';
                                break;
                            case '生成视频':
                                response = '我可以帮您生成视频。请告诉我您想要什么类型的视频内容。';
                                break;
                            case '生成图片':
                                response = '我可以帮您生成图片。请告诉我您想要生成什么内容的图片，例如：雨伞、学校、小草、香蕉、马克杯、榴莲、吉他、红色花朵、红苹果、多肉植物、大厦、茶饼、白色陶瓷杯、大树等。';
                                break;
                            default:
                                response = '服务器繁忙，请稍后再试。';
                        }
                        
                        addMessage(response, 'ai');
                    }, 3000);
                    
                    resetAutoLogoutTimer();
                });
            });

            // 注销账号按钮点击事件
            deleteAccountBtn.addEventListener('click', () => {
                if (confirm('确定要注销账号吗？此操作不可恢复，3天内不登录将自动注销。')) {
                    // 设置注销标记和时间
                    localStorage.setItem('accountDeletionMarked', 'true');
                    localStorage.setItem('accountDeletionTime', Date.now());
                    alert('账号已标记为注销，3天内不登录将自动注销。');
                    settingsDropdown.classList.add('hidden');
                }
            });

            // 发送消息
            messageForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const message = messageInput.value.trim();
                if (!message) return;

                // 添加用户消息
                addMessage(message, 'user');
                messageInput.value = '';

                // 重置自动注销计时器
                resetAutoLogoutTimer();

                // 显示正在输入指示器
                const typingIndicator = createTypingIndicator();
                chatMessages.appendChild(typingIndicator);
                chatMessages.scrollTop = chatMessages.scrollHeight;

                // 检测设备类型
                const isWindows = navigator.userAgent.indexOf('Windows') !== -1;
                const delay = isWindows ? 60000 : 5000; // Windows设备1分钟，其他设备5秒

                // 检查是否是生成图片的请求
                const imageRequest = checkImageRequest(message);
                if (imageRequest.found) {
                    // 延迟回复
                    setTimeout(() => {
                        // 移除输入指示器
                        chatMessages.removeChild(typingIndicator);
                        
                        // 添加图片回复
                        addImageMessage(imageRequest.imageUrl);
                    }, 3000);
                    return;
                }

                // 延迟回复
                setTimeout(() => {
                    // 移除输入指示器
                    chatMessages.removeChild(typingIndicator);
                    
                    // 添加AI回复
                    const responses = [
                        '服务器繁忙，请稍后再试。',
                        '当前使用人数较多，请稍后再试。'
                    ];
                    const randomResponse = responses[Math.floor(Math.random() * responses.length)];
                    addMessage(randomResponse, 'ai');
                }, delay);
            });

            // 检查是否是图片生成请求
            const checkImageRequest = (message) => {
                const lowerMessage = message.toLowerCase();
                for (const [keyword, imageUrl] of Object.entries(imageLibrary)) {
                    if (lowerMessage.includes(keyword.toLowerCase())) {
                        return { found: true, imageUrl: imageUrl };
                    }
                }
                return { found: false, imageUrl: null };
            };

            // 添加图片消息
            const addImageMessage = (imageUrl) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'flex items-start space-x-4';
                messageDiv.innerHTML = `
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                        <i class="fa fa-robot"></i>
                    </div>
                    <div class="bg-neutral-light rounded-lg p-4 max-w-[80%]">
                        <div class="relative inline-block">
                            <canvas id="image-canvas" class="max-w-full h-auto rounded-lg"></canvas>
                        </div>
                        <div class="mt-2">
                            <button class="download-btn px-3 py-1 bg-primary text-white rounded text-sm hover:bg-blue-600 transition-colors" 
                                    data-image="${imageUrl}">
                                <i class="fa fa-download mr-1"></i>下载图片
                            </button>
                        </div>
                    </div>
                `;

                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // 绘制带水印的图片
                drawImageWithWatermark(imageUrl);
                
                // 添加下载按钮事件
                const downloadBtn = messageDiv.querySelector('.download-btn');
                downloadBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    downloadImage(imageUrl);
                });
            };

            // 绘制带水印的图片
            const drawImageWithWatermark = (imageUrl) => {
                const canvas = document.getElementById('image-canvas');
                const ctx = canvas.getContext('2d');
                
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    // 设置canvas尺寸
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    // 绘制原图
                    ctx.drawImage(img, 0, 0);
                    
                    // 加载并绘制水印图片（支持透明背景）
                    const watermarkImg = new Image();
                    watermarkImg.crossOrigin = 'Anonymous';
                    watermarkImg.onload = () => {
                        // 计算水印位置（右下角）
                        const watermarkWidth = 120; // 水印宽度
                        const watermarkHeight = (watermarkImg.height * watermarkWidth) / watermarkImg.width; // 保持宽高比
                        
                        const x = canvas.width - watermarkWidth - 10; // 右边距10px
                        const y = canvas.height - watermarkHeight - 10; // 下边距10px
                        
                        // 绘制水印图片（自动支持透明背景）
                        ctx.globalCompositeOperation = 'source-over'; // 确保透明部分正常显示
                        ctx.drawImage(watermarkImg, x, y, watermarkWidth, watermarkHeight);
                    };
                    watermarkImg.src = watermarkImageUrl;
                };
                img.src = imageUrl;
            };

            // 下载图片
            const downloadImage = (imageUrl) => {
                const canvas = document.getElementById('image-canvas');
                const link = document.createElement('a');
                link.download = `毕小皮AI_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            // 添加消息到聊天区域
            const addMessage = (message, sender, save = true) => {
                const messageDiv = document.createElement('div');
                messageDiv.className = 'flex items-start space-x-4';

                if (sender === 'user') {
                    messageDiv.classList.add('justify-end');
                    messageDiv.innerHTML = `
                        <div class="bg-primary text-white rounded-lg p-4 max-w-[80%]">
                            <p>${message}</p>
                        </div>
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-gray-300 text-white flex items-center justify-center">
                            <i class="fa fa-user"></i>
                        </div>
                    `;
                } else {
                    messageDiv.innerHTML = `
                        <div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                            <i class="fa fa-robot"></i>
                        </div>
                        <div class="bg-neutral-light rounded-lg p-4 max-w-[80%]">
                            <p class="text-neutral-dark">${message}</p>
                        </div>
                    `;
                }

                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
                
                // 保存消息
                if (save) {
                    saveMessage(message, sender);
                }
            };

            // 创建输入指示器
            const createTypingIndicator = () => {
                const div = document.createElement('div');
                div.className = 'flex items-start space-x-4';
                div.innerHTML = `
                    <div class="flex-shrink-0 w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center">
                        <i class="fa fa-robot"></i>
                    </div>
                    <div class="bg-neutral-light rounded-lg p-4">
                        <div class="typing-indicator">
                            <span></span>
                            <span></span>
                            <span></span>
                        </div>
                    </div>
                `;
                return div;
            };

            // 显示消息
            const showMessage = (text, type) => {
                loginMessage.textContent = text;
                loginMessage.classList.remove('hidden', 'text-red-500', 'text-green-500');
                loginMessage.classList.add(type === 'error' ? 'text-red-500' : 'text-green-500');
                
                setTimeout(() => {
                    loginMessage.classList.add('hidden');
                }, 3000);
            };



            // 验证邮箱格式
            const isValidEmail = (email) => {
                const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return re.test(email);
            };

            // 验证密码格式（4位数，必须包含3和9）
            const isValidPassword = (password) => {
                // 检查是否为4位数
                if (password.length !== 4 || !/^\d+$/.test(password)) {
                    return false;
                }
                // 检查是否包含3和9
                return password.includes('3') && password.includes('9');
            };

            // 重置自动注销计时器
            const resetAutoLogoutTimer = () => {
                localStorage.setItem('lastActivityTime', Date.now());
                
                if (autoLogoutTimer) {
                    clearInterval(autoLogoutTimer);
                }
                
                autoLogoutTimer = setInterval(() => {
                    const lastActivity = parseInt(localStorage.getItem('lastActivityTime'));
                    const now = Date.now();
                    
                    if (now - lastActivity > AUTO_LOGOUT_TIME) {
                        // 检查是否标记了注销
                        const deletionMarked = localStorage.getItem('accountDeletionMarked');
                        if (deletionMarked === 'true') {
                            // 自动注销账号
                            localStorage.clear();
                            alert('您的账号已自动注销。');
                        } else {
                            // 自动退出登录
                            localStorage.removeItem('userEmail');
                            localStorage.removeItem('lastActivityTime');
                        }
                        showLoginPage();
                    }
                }, 60000); // 每分钟检查一次
            };

            // 新建对话按钮事件
            newChatBtn.addEventListener('click', () => {
                createNewConversation();
            });
            

            
            // 检查账号是否应该被注销
            const checkAccountDeletion = () => {
                const deletionMarked = localStorage.getItem('accountDeletionMarked');
                const deletionTime = localStorage.getItem('accountDeletionTime');
                
                if (deletionMarked === 'true' && deletionTime) {
                    const now = Date.now();
                    const deletionTimeMs = parseInt(deletionTime);
                    
                    if (now - deletionTimeMs > AUTO_LOGOUT_TIME) {
                        // 自动注销账号
                        localStorage.clear();
                        alert('您的账号已自动注销。');
                    }
                }
            };
            
            // 侧边栏折叠/展开功能
            toggleSidebarBtn.addEventListener('click', () => {
                sidebarCollapsed = !sidebarCollapsed;
                
                if (sidebarCollapsed) {
                    // 折叠侧边栏
                    sidebar.classList.remove('md:w-64');
                    sidebar.classList.add('md:w-16');
                    newChatText.classList.add('hidden');
                    toggleSidebarBtn.innerHTML = '<i class="fa fa-angle-right"></i>';
                    
                    // 隐藏对话标题，只显示图标
                    const convTitles = document.querySelectorAll('#conversation-list p');
                    convTitles.forEach(title => {
                        title.classList.add('hidden');
                    });
                } else {
                    // 展开侧边栏
                    sidebar.classList.remove('md:w-16');
                    sidebar.classList.add('md:w-64');
                    newChatText.classList.remove('hidden');
                    toggleSidebarBtn.innerHTML = '<i class="fa fa-angle-left"></i>';
                    
                    // 显示对话标题
                    const convTitles = document.querySelectorAll('#conversation-list p');
                    convTitles.forEach(title => {
                        title.classList.remove('hidden');
                    });
                }
                
                resetAutoLogoutTimer();
            });



            // 初始化
            const initApp = () => {
                console.log('初始化应用...');
                checkAccountDeletion();
                checkLogin();
                

            };
            
            // 启动应用
            initApp();
        });
    </script>

</body></html>
